<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>csyjackpot — 퀀트 스크리닝</title>
  <link rel="stylesheet" href="css/style.css?v=1" />
</head>
<body>
  <header class="topbar">
    <span class="logo">csyjackpot</span>
    <nav>
      <a href="index.html">종목조회</a>
      <a href="screen.html" class="active">스크리닝</a>
      <a href="backtest.html">백테스트</a>
      <a href="portfolio.html">포트폴리오</a>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <div class="section-title">종목 목록</div>
      <textarea id="tickers" rows="3" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;font-size:14px;resize:vertical;"
        placeholder="티커를 쉼표/공백/줄바꿈으로 구분 입력">AAPL, MSFT, NVDA, GOOGL, 005930.KS, 000660.KS</textarea>

      <div class="section-title" style="margin-top:16px;">필터 조건 <span style="font-weight:400;color:var(--muted);font-size:12px;">(비워두면 해당 조건 무시)</span></div>
      <div class="metrics" style="margin-top:0;">
        <label class="metric"><div class="k">PER 이하</div><input id="per_max" type="number" step="any" placeholder="예: 30" /></label>
        <label class="metric"><div class="k">PBR 이하</div><input id="pbr_max" type="number" step="any" placeholder="예: 5" /></label>
        <label class="metric"><div class="k">ROE(%) 이상</div><input id="roe_min" type="number" step="any" placeholder="예: 10" /></label>
        <label class="metric"><div class="k">배당(%) 이상</div><input id="dividend_min" type="number" step="any" placeholder="예: 1" /></label>
      </div>
      <button id="runBtn" style="margin-top:16px;padding:12px 22px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">스크리닝 실행</button>
    </div>

    <div id="status" class="status hidden"></div>
    <div id="result" class="card hidden">
      <div class="section-title" id="summary"></div>
      <div id="table"></div>
    </div>
  </div>

  <script src="js/api.js?v=1"></script>
  <script src="js/screen.js?v=1"></script>
</body>
</html>
